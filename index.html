<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento Familiar - Família Melo</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <meta name="theme-color" content="#0f1117" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Orçamento">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle" style="width:64px;height:64px;font-size:2rem;margin-bottom:1rem;">💰</div>
                <h2>Orçamento Familiar</h2>
                <p>FAMÍLIA MELO</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Senha de acesso</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                        <button type="button" id="togglePassword" class="toggle-password-btn">👁️</button>
                    </div>
                </div>
                <p id="loginError" class="login-error"></p>
                <button type="submit" class="btn btn-primary btn-login">Entrar</button>
            </form>
            <p class="login-hint">Primeiro acesso? Defina sua senha agora.</p>
        </div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo">
                <div class="logo-circle">💰</div>
                <div>
                    <h1>Orçamento Familiar</h1>
                    <small>FAMÍLIA MELO</small>
                </div>
            </a>

            <div class="header-right" style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
                <div class="datetime" id="datetime"></div>
                
                <div class="header-actions">
                    <button id="btnThemeToggle" class="btn-icon" title="Alternar tema">🌓</button>
                    <button id="btnExcelTemplate" class="btn btn-secondary">📥 Modelo</button>
                    <button id="btnExportExcel" class="btn btn-secondary">📊 XLS</button>
                    <button id="btnImportExcel" class="btn btn-secondary">📤 Importar</button>
                    <button id="btnExportPDF" class="btn btn-secondary">📄 PDF</button>
                    <button id="btnExport" class="btn btn-secondary">💾 Backup</button>
                    <button id="btnImport" class="btn btn-secondary">🔄 Restaurar</button>
                    <button id="btnReset" class="btn btn-danger">Resetar</button>
                    <button id="btnLogout" class="btn btn-secondary">🚪 Sair</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Month Selector + Calculator + Mini Calendar -->
        <section class="month-selector-wrapper">
            <!-- ... (mantenha o conteúdo atual do month-selector-wrapper) ... -->
            <!-- Você pode colar o conteúdo original aqui se quiser manter exatamente -->
        </section>

        <!-- Summary Cards -->
        <section class="summary-cards">
            <!-- ... mantenha o conteúdo original dos cards ... -->
        </section>

        <!-- Restante do conteúdo (Receitas, Despesas, Gráficos, etc.) -->
        <!-- Você pode manter praticamente tudo igual, só com as melhorias de classe se necessário -->

        <!-- Modal principal (mantenha o que já tem) -->
        <!-- ... resto do HTML original ... -->
    </main>

    <footer class="footer">
        <p>Orçamento Familiar - Família Melo © 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
